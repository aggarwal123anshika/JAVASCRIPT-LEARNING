<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Object</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        #container {
            width: 100%;
            min-height: 300px;
            border: 3px solid black;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            padding: 10px;
            gap: 10px;
            box-sizing: border-box;
        }

        .box {
            width: 60px;
            height: 60px;
            cursor: pointer;
        }

        button {
            margin-bottom: 15px;
            padding: 8px 15px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h1>Event Object</h1>

    <div id="container"></div> -->

    </h3>

</body>
</html>
